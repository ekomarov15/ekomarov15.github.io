<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Выполнение задания</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: #ecf2f9;
            padding: 24px;
            display: flex;
            justify-content: center;
        }
        .container {
            max-width: 900px;
            width: 100%;
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(12px);
            border-radius: 48px;
            padding: 40px;
            border: 1px solid white;
        }
        h2 { color: #1e3a5f; font-size: 2rem; font-weight: 400; margin-bottom: 16px; }
        .assignment-title { font-size: 1.8rem; font-weight: 500; margin-bottom: 24px; color: #102b44; }
        .assignment-desc {
            background: rgba(255,255,255,0.5);
            padding: 24px;
            border-radius: 32px;
            margin-bottom: 32px;
            border: 1px solid #b5cce6;
            white-space: pre-wrap;
        }
        .editor-label { font-weight: 600; margin: 24px 0 8px; color: #1e3a5f; }
        .answer-textarea {
            width: 100%;
            padding: 20px;
            border-radius: 32px;
            border: 2px solid #b0c8e5;
            font-size: 1rem;
            background: white;
            resize: vertical;
            min-height: 200px;
        }
        .image-upload {
            margin: 24px 0;
            background: #eef4fc;
            border-radius: 40px;
            padding: 24px;
            border: 2px dashed #9bb5d9;
            text-align: center;
        }
        .image-preview {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            margin: 16px 0;
        }
        .preview-img {
            max-width: 150px;
            max-height: 150px;
            border-radius: 24px;
            border: 3px solid white;
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
        }
        .btn {
            background: #1e3a5f;
            color: white;
            border: none;
            padding: 16px 36px;
            border-radius: 40px;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 24px;
        }
        .btn:hover { background: #15304f; }
    </style>
</head>
<body>
    <div class="container" id="main"></div>
    <script>
        (function() {
            const user = JSON.parse(localStorage.getItem('currentUser'));
            if (!user || user.role !== 'student') {
                alert('Доступ только ученикам');
                window.close();
                return;
            }

            const urlParams = new URLSearchParams(window.location.search);
            const assignmentId = urlParams.get('id');
            if (!assignmentId) { alert('Задание не указано'); window.close(); return; }

            const assignments = JSON.parse(localStorage.getItem('assignments')) || [];
            const assignment = assignments.find(a => a.id == assignmentId);
            if (!assignment) { alert('Задание не найдено'); window.close(); return; }

            const container = document.getElementById('main');
            let imagesData = [];

            function render() {
                container.innerHTML = `
                    <h2>✍️ Выполнение</h2>
                    <div class="assignment-title">${assignment.title}</div>
                    <div class="assignment-desc">${assignment.description.replace(/\n/g, '<br>')}</div>
                    <div class="editor-label">Ваш ответ (текст):</div>
                    <textarea id="studentText" class="answer-textarea" placeholder="Напишите ответ..."></textarea>
                    <div class="image-upload">
                        <label for="imageInput" style="cursor:pointer; display:block;">
                            📎 Прикрепить фото тетради (можно несколько)
                        </label>
                        <input type="file" id="imageInput" accept="image/*" multiple style="margin-top:12px;">
                        <div class="image-preview" id="preview"></div>
                    </div>
                    <button class="btn" id="submitBtn">📤 Отправить на проверку</button>
                `;

                document.getElementById('imageInput').addEventListener('change', function(e) {
                    const preview = document.getElementById('preview');
                    preview.innerHTML = '';
                    imagesData = [];
                    const files = Array.from(e.target.files);
                    files.forEach(file => {
                        const reader = new FileReader();
                        reader.onload = (ev) => {
                            imagesData.push(ev.target.result);
                            const img = document.createElement('img');
                            img.src = ev.target.result;
                            img.className = 'preview-img';
                            preview.appendChild(img);
                        };
                        reader.readAsDataURL(file);
                    });
                });

                document.getElementById('submitBtn').addEventListener('click', () => {
                    const textAnswer = document.getElementById('studentText').value.trim();
                    if (!textAnswer && imagesData.length === 0) {
                        alert('Напишите ответ или прикрепите фото');
                        return;
                    }
                    const submissions = JSON.parse(localStorage.getItem('submissions')) || [];
                    const newSub = {
                        id: Date.now(),
                        assignmentId: assignment.id,
                        student: user.username,
                        studentName: user.username,
                        textAnswer,
                        images: imagesData,
                        status: 'submitted', // 'checked' or 'submitted'
                        teacherComment: '',
                        score: null,
                        grade: null,
                        checked: false
                    };
                    submissions.push(newSub);
                    localStorage.setItem('submissions', JSON.stringify(submissions));
                    alert('Работа отправлена!');
                    window.close();
                });
            }
            render();
        })();
    </script>
</body>
</html>
</html>
