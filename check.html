<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Проверка работы | Занимательный русский</title>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="notebook-page">
        <div class="tabs">
            <a href="main.html" class="tab">Главная</a>
            <a href="homework.html" class="tab">Домашнее задание</a>
            <a href="works.html" class="tab active">Работы</a>
        </div>
        <div class="content">
            <h2>Проверка работы</h2>
            <div id="taskBlock" class="task-block"></div>
            <div>
                <h3>Ответ ученика:</h3>
                <div id="studentAnswer" contenteditable="true" class="editor"></div>
                <div class="color-tools">
                    <button onclick="highlight('yellow')">Выделить жёлтым</button>
                    <button onclick="highlight('lightcoral')">Выделить красным</button>
                    <button onclick="highlight('lightgreen')">Выделить зелёным</button>
                    <button onclick="removeHighlight()">Убрать выделение</button>
                </div>
                <div id="imagePreview"></div>
            </div>
            <div>
                <label for="teacherComment">Комментарий учителя:</label>
                <textarea id="teacherComment" rows="3" style="width: 100%;"></textarea>
            </div>
            <div>
                <label for="score">Балл:</label>
                <input type="number" id="score" min="0" style="width: 80px;">
                <span> / <span id="maxScore"></span></span>
            </div>
            <button id="finishCheck">Завершить проверку</button>
        </div>
    </div>
    <script src="script.js"></script>
    <script>
        checkAuth();
        if (getRole() !== 'teacher') {
            alert('Доступ запрещён');
            window.location.href = 'main.html';
        }
        
        const urlParams = new URLSearchParams(window.location.search);
        const submissionId = urlParams.get('id');
        const submissions = getSubmissions();
        const submission = submissions.find(s => s.id === submissionId);
        if (!submission) {
            alert('Работа не найдена');
            window.location.href = 'works.html';
        }
        
        const tasks = getTasks();
        const task = tasks.find(t => t.id === submission.taskId);
        
        document.getElementById('taskBlock').innerHTML = `<p><strong>Задание:</strong> ${task.text}</p>`;
        document.getElementById('maxScore').textContent = task.maxScore;
        
        const answerEl = document.getElementById('studentAnswer');
        if (submission.correctedAnswer) {
            answerEl.innerHTML = submission.correctedAnswer;
        } else {
            answerEl.textContent = submission.answerText || '';
        }
        
        if (submission.answerImages) {
            const preview = document.getElementById('imagePreview');
            submission.answerImages.forEach(src => {
                const img = document.createElement('img');
                img.src = src;
                img.style.maxWidth = '200px';
                img.style.margin = '5px';
                preview.appendChild(img);
            });
        }
        
        if (submission.teacherComment) {
            document.getElementById('teacherComment').value = submission.teacherComment;
        }
        if (submission.score) {
            document.getElementById('score').value = submission.score;
        }
        
        window.highlight = function(color) {
            document.execCommand('backColor', false, color);
        };
        
        window.removeHighlight = function() {
            document.execCommand('removeFormat', false, null);
        };
        
        document.getElementById('finishCheck').addEventListener('click', function() {
            const correctedAnswer = document.getElementById('studentAnswer').innerHTML;
            const teacherComment = document.getElementById('teacherComment').value;
            const score = parseInt(document.getElementById('score').value);
            
            if (isNaN(score) || score < 0 || score > task.maxScore) {
                alert(`Введите корректный балл от 0 до ${task.maxScore}`);
                return;
            }
            
            submission.correctedAnswer = correctedAnswer;
            submission.teacherComment = teacherComment;
            submission.score = score;
            submission.status = 'checked';
            submission.checkedAt = new Date().toISOString();
            
            updateSubmission(submission);
            alert('Проверка завершена');
            window.location.href = 'works.html';
        });
    </script>
</body>
</html>
</html>
