<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Выполнение задания | Занимательный русский</title>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="notebook-page">
        <div class="tabs">
            <a href="main.html" class="tab">Главная</a>
            <a href="homework.html" class="tab">Домашнее задание</a>
            <a href="works.html" class="tab" id="worksTab" style="display: none;">Работы</a>
        </div>
        <div class="content">
            <h2>Задание</h2>
            <div id="taskView" class="task-block"></div>

            <!-- Блок для ученика (если работа не проверена или новая) -->
            <div id="studentAnswerSection">
                <h3>Ваш ответ</h3>
                <div id="answerEditor" contenteditable="true" class="editor"></div>
                <div>
                    <label>Прикрепить фото:</label>
                    <input type="file" id="imageUpload" accept="image/*" multiple>
                </div>
                <div id="imagePreview"></div>
                <button id="submitBtn">Отправить на проверку</button>
            </div>

            <!-- Блок с результатом проверки (для проверенной работы) -->
            <div id="resultSection" style="display: none;">
                <h3>Результат проверки</h3>
                <div id="correctedAnswerBlock" class="student-essay"></div>
                <div id="teacherCommentBlock" class="teacher-comment"></div>
                <div id="scoreBlock" class="score-block"></div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
    <script>
        checkAuth();
        if (getRole() !== 'student') {
            alert('Доступ только для учеников');
            window.location.href = 'main.html';
        }
        
        const urlParams = new URLSearchParams(window.location.search);
        const taskId = urlParams.get('taskId');
        const viewOnly = urlParams.get('view') === 'true';
        
        const tasks = getTasks();
        const task = tasks.find(t => t.id === taskId);
        if (!task) {
            alert('Задание не найдено');
            window.location.href = 'homework.html';
        }
        
        document.getElementById('taskView').innerHTML = `<p><strong>Задание:</strong> ${task.text}</p>`;
        
        const submissions = getSubmissions();
        let submission = submissions.find(s => s.taskId === taskId && s.studentId === 'st1');
        
        if (viewOnly && submission && submission.status === 'checked') {
            // Показываем проверенную работу
            document.getElementById('studentAnswerSection').style.display = 'none';
            document.getElementById('resultSection').style.display = 'block';
            
            // Вставляем исправленный текст (correctedAnswer) — он уже содержит все пометки
            document.getElementById('correctedAnswerBlock').innerHTML = submission.correctedAnswer || submission.answerText;
            
            // Комментарий учителя
            document.getElementById('teacherCommentBlock').innerHTML = `<strong>Комментарий:</strong> ${submission.teacherComment || ''}`;
            
            // Балл
            document.getElementById('scoreBlock').innerHTML = `Балл: ${submission.score} / ${task.maxScore}`;
            
        } else if (!viewOnly) {
            // Режим выполнения / редактирования
            if (submission && submission.status !== 'checked') {
                document.getElementById('submitBtn').disabled = true;
                document.getElementById('submitBtn').textContent = 'Работа на проверке';
                if (submission.answerText) {
                    document.getElementById('answerEditor').innerHTML = submission.answerText;
                }
                if (submission.answerImages) {
                    showImages(submission.answerImages);
                }
            }
            
            document.getElementById('submitBtn').addEventListener('click', function() {
                const answerText = document.getElementById('answerEditor').innerHTML;
                const images = collectImages();
                const newSubmission = {
                    id: submission ? submission.id : Date.now().toString(),
                    taskId: task.id,
                    studentId: 'st1',
                    answerText: answerText,
                    answerImages: images,
                    status: 'submitted',
                    submittedAt: new Date().toISOString(),
                    correctedAnswer: null,
                    score: null,
                    teacherComment: null
                };
                if (submission) {
                    updateSubmission(newSubmission);
                } else {
                    saveSubmission(newSubmission);
                }
                alert('Ответ отправлен на проверку');
                window.location.href = 'homework.html';
            });
            
            function collectImages() {
                const preview = document.getElementById('imagePreview');
                const imgs = preview.querySelectorAll('img');
                return Array.from(imgs).map(img => img.src);
            }
            
            document.getElementById('imageUpload').addEventListener('change', function(e) {
                const preview = document.getElementById('imagePreview');
                Array.from(e.target.files).forEach(file => {
                    const reader = new FileReader();
                    reader.onload = function(ev) {
                        const img = document.createElement('img');
                        img.src = ev.target.result;
                        img.style.maxWidth = '200px';
                        img.style.margin = '5px';
                        preview.appendChild(img);
                    };
                    reader.readAsDataURL(file);
                });
            });
            
            function showImages(images) {
                const preview = document.getElementById('imagePreview');
                images.forEach(src => {
                    const img = document.createElement('img');
                    img.src = src;
                    img.style.maxWidth = '200px';
                    img.style.margin = '5px';
                    preview.appendChild(img);
                });
            }
        } else {
            // Если viewOnly, но работа не проверена или не найдена
            alert('Работа ещё не проверена');
            window.location.href = 'homework.html';
        }
    </script>
</body>
</html>
</html>
