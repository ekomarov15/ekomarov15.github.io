<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Главная — Занимательный русский</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: #ecf2f9;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .navbar {
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 16px 5vw;
            display: flex;
            gap: 32px;
            align-items: center;
            border-bottom: 1px solid rgba(120,150,200,0.3);
            flex-wrap: wrap;
        }
        .logo {
            font-size: 1.8rem;
            font-weight: 500;
            color: #1e3a5f;
            margin-right: auto;
        }
        .tab {
            font-size: 1.2rem;
            padding: 8px 0;
            text-decoration: none;
            color: #1e3a5f;
            border-bottom: 3px solid transparent;
            transition: 0.2s;
            font-weight: 500;
        }
        .tab.active {
            border-bottom-color: #1e3a5f;
            color: #0a1a2c;
        }
        .tab:not(.active):hover {
            border-bottom-color: #9bb5d9;
        }
        .logout {
            margin-left: auto;
            background: none;
            border: 2px solid #b0c6dd;
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 1rem;
            cursor: pointer;
            background: rgba(255,255,255,0.5);
            font-weight: 600;
            color: #1e3a5f;
        }
        .logout:hover {
            background: #fff;
            border-color: #1e3a5f;
        }
        .content {
            flex: 1;
            padding: 5vh 5vw;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }
        .welcome-card {
            background: rgba(255,255,255,0.6);
            backdrop-filter: blur(8px);
            border-radius: 40px;
            padding: 48px;
            box-shadow: 0 15px 30px rgba(0,30,60,0.1);
            border: 1px solid rgba(255,255,255,0.6);
            max-width: 900px;
            width: 100%;
            margin: 0 auto;
        }
        h2 {
            font-size: 2.5rem;
            font-weight: 400;
            color: #102b44;
            margin-bottom: 16px;
        }
        p {
            font-size: 1.3rem;
            color: #1f3a5e;
            opacity: 0.9;
            line-height: 1.5;
        }
        .features {
            display: flex;
            gap: 24px;
            flex-wrap: wrap;
            margin-top: 32px;
        }
        .feature {
            background: white;
            border-radius: 32px;
            padding: 24px;
            flex: 1 1 200px;
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(4px);
            border: 1px solid white;
        }
    </style>
</head>
<body>
    <div class="navbar">
        <span class="logo">✨ Занимательный русский</span>
        <a href="home.html" class="tab active">Главная</a>
        <a href="homework.html" class="tab">Домашнее задание</a>
        <a href="works.html" class="tab" id="worksTab" style="display: none;">Работы</a>
        <button class="logout" id="logoutBtn">Выйти</button>
    </div>

    <div class="content">
        <div class="welcome-card">
            <h2 id="greeting"></h2>
            <p>Добро пожаловать в мир увлекательного русского языка! Здесь вы найдёте необычные задания, интересные факты и возможность глубже понять родную речь.</p>
            <div class="features">
                <div class="feature">📚 Интерактивные упражнения</div>
                <div class="feature">✍️ Проверка работ с подсветкой ошибок</div>
                <div class="feature">🖼️ Загрузка фото тетради</div>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // Получаем пользователя сначала из sessionStorage, потом из localStorage (для совместимости)
            let user;
            try {
                user = JSON.parse(sessionStorage.getItem('currentUser'));
                if (!user) {
                    user = JSON.parse(localStorage.getItem('currentUser'));
                    if (user) {
                        // Переносим в sessionStorage и удаляем из localStorage
                        sessionStorage.setItem('currentUser', JSON.stringify(user));
                        localStorage.removeItem('currentUser');
                    }
                }
            } catch (e) {
                user = null;
            }
            if (!user || (user.role !== 'teacher' && user.role !== 'student')) {
                window.location.href = 'login.html';
                return;
            }
            const role = user.role;
            const username = user.username;

            document.getElementById('greeting').innerText = role === 'teacher' ? 'Здравствуйте, учитель!' : 'Привет, ученик!';

            if (role === 'teacher') {
                document.getElementById('worksTab').style.display = 'inline-block';
            }

            document.getElementById('logoutBtn').addEventListener('click', () => {
                sessionStorage.removeItem('currentUser');
                // также удалим из localStorage на всякий случай
                localStorage.removeItem('currentUser');
                window.location.href = 'login.html';
            });
        })();
    </script>
</body>
</html>
</html>
