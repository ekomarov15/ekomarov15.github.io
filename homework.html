<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Домашнее задание — Занимательный русский</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: #ecf2f9;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .navbar {
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(16px);
            padding: 16px 5vw;
            display: flex;
            gap: 32px;
            align-items: center;
            flex-wrap: wrap;
            border-bottom: 1px solid rgba(120,150,200,0.3);
        }
        .logo { font-size: 1.8rem; font-weight: 500; color: #1e3a5f; margin-right: auto; }
        .tab {
            font-size: 1.2rem;
            padding: 8px 0;
            text-decoration: none;
            color: #1e3a5f;
            border-bottom: 3px solid transparent;
            font-weight: 500;
        }
        .tab.active { border-bottom-color: #1e3a5f; color: #0a1a2c; }
        .logout {
            margin-left: auto;
            border: 2px solid #b0c6dd;
            padding: 8px 20px;
            border-radius: 40px;
            background: rgba(255,255,255,0.5);
            cursor: pointer;
            font-weight: 600;
        }
        .content {
            flex: 1;
            padding: 5vh 5vw;
        }
        .card {
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(12px);
            border-radius: 40px;
            padding: 32px;
            border: 1px solid rgba(255,255,255,0.7);
            max-width: 1000px;
            margin: 0 auto 40px;
        }
        h2 { color: #1e3a5f; margin-bottom: 24px; font-weight: 400; font-size: 2rem; }
        .teacher-form textarea, .teacher-form input {
            width: 100%;
            padding: 16px;
            margin-bottom: 20px;
            border: 2px solid rgba(100,140,200,0.3);
            border-radius: 30px;
            font-size: 1rem;
            background: white;
            resize: vertical;
        }
        .btn {
            background: #1e3a5f;
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 40px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            margin-right: 10px;
        }
        .btn-secondary {
            background: #d5e4ff;
            color: #1e3a5f;
        }
        .assignment-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .assignment-item {
            background: white;
            border-radius: 30px;
            padding: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            border: 1px solid #d0e0f0;
        }
        .assignment-info {
            flex: 2 1 300px;
        }
        .assignment-info h3 { margin-bottom: 8px; color: #102b44; }
        .assignment-info p { color: #2f4b70; }
        .assignment-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .btn-small {
            background: #d5e4ff;
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            font-weight: 600;
            color: #1e3a5f;
            cursor: pointer;
            font-size: 0.9rem;
        }
        .btn-small.delete {
            background: #ffe0e0;
            color: #b33;
        }
        hr { border: 1px solid #d4e2f0; margin: 40px 0; }
        .results-list {
            display: flex;
            flex-direction: column;
            gap: 24px;
            margin-top: 20px;
        }
        .result-card {
            background: white;
            border-radius: 32px;
            padding: 28px;
            border: 1px solid #c9daf2;
        }
        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        .result-title {
            font-size: 1.5rem;
            color: #102b44;
            font-weight: 500;
        }
        .result-score {
            background: #d4e2fc;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: 700;
            color: #1e3a5f;
        }
        .result-comment {
            background: #f0f6ff;
            border-radius: 24px;
            padding: 16px;
            margin: 16px 0;
            font-style: italic;
        }
        .student-answer-result {
            background: #f9fcff;
            border: 2px dashed #a0bde0;
            border-radius: 28px;
            padding: 20px;
            margin: 16px 0;
        }
        .student-answer-result img {
            max-width: 200px;
            border-radius: 24px;
            margin: 8px;
            border: 2px solid white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .cancel-edit {
            background: #b0c6dd;
            color: #1e3a5f;
            border: none;
            padding: 14px 28px;
            border-radius: 40px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="navbar">
        <span class="logo">✨ Занимательный русский</span>
        <a href="home.html" class="tab">Главная</a>
        <a href="homework.html" class="tab active">Домашнее задание</a>
        <a href="works.html" class="tab" id="worksTab" style="display: none;">Работы</a>
        <button class="logout" id="logoutBtn">Выйти</button>
    </div>

    <div class="content">
        <div class="card" id="homeworkContainer"></div>
    </div>

    <script>
        (function() {
            // Проверка авторизации и роли
            let user;
            try {
                user = JSON.parse(sessionStorage.getItem('currentUser'));
            } catch (e) {
                user = null;
            }
            if (!user || (user.role !== 'teacher' && user.role !== 'student')) {
                window.location.href = 'login.html';
                return;
            }
            const role = user.role;
            const username = user.username;

            // Навигация: показать вкладку "Работы" только учителю
            if (role === 'teacher') {
                document.getElementById('worksTab').style.display = 'inline-block';
            }

            document.getElementById('logoutBtn').addEventListener('click', () => {
                sessionStorage.removeItem('currentUser');
                window.location.href = 'login.html';
            });

            // Инициализация хранилищ (если пусты)
            if (!localStorage.getItem('assignments')) {
                localStorage.setItem('assignments', JSON.stringify([]));
            }
            if (!localStorage.getItem('submissions')) {
                localStorage.setItem('submissions', JSON.stringify([]));
            }

            const container = document.getElementById('homeworkContainer');

            function render() {
                if (role === 'teacher') {
                    renderTeacherView();
                } else {
                    renderStudentView();
                }
            }

            // ---------- УЧИТЕЛЬСКАЯ ВЕРСИЯ (с редактированием и удалением) ----------
            let editingId = null; // id редактируемого задания, если null — создание нового

            function renderTeacherView() {
                const assignments = JSON.parse(localStorage.getItem('assignments')) || [];

                container.innerHTML = `
                    <h2>${editingId ? '✏️ Редактировать задание' : '📝 Создать задание'}</h2>
                    <div class="teacher-form">
                        <input type="text" id="titleInput" placeholder="Название задания" value="" />
                        <textarea id="descInput" placeholder="Текст задания (можно использовать форматирование)" rows="5"></textarea>
                        <input type="number" id="maxScoreInput" placeholder="Максимальный балл" />
                        <textarea id="answerInput" placeholder="Ответ для учителя (виден только при проверке)" rows="3"></textarea>
                        <div style="display: flex; gap: 10px; flex-wrap: wrap;">
                            <button class="btn" id="saveBtn">${editingId ? '💾 Сохранить изменения' : '➕ Создать задание'}</button>
                            ${editingId ? '<button class="cancel-edit" id="cancelEditBtn">Отмена</button>' : ''}
                        </div>
                    </div>
                    <hr />
                    <h2>📋 Все задания</h2>
                    <div id="allAssignmentsList" class="assignment-list"></div>
                `;

                // Если редактируем, заполняем поля
                if (editingId) {
                    const assignment = assignments.find(a => a.id == editingId);
                    if (assignment) {
                        document.getElementById('titleInput').value = assignment.title || '';
                        document.getElementById('descInput').value = assignment.description || '';
                        document.getElementById('maxScoreInput').value = assignment.maxScore || '';
                        document.getElementById('answerInput').value = assignment.answer || '';
                    }
                }

                // Отображаем список заданий с кнопками
                const listDiv = document.getElementById('allAssignmentsList');
                if (assignments.length === 0) {
                    listDiv.innerHTML = '<p>Пока нет заданий</p>';
                } else {
                    listDiv.innerHTML = assignments.map(a => `
                        <div class="assignment-item" data-id="${a.id}">
                            <div class="assignment-info">
                                <h3>${escapeHtml(a.title)}</h3>
                                <p>${escapeHtml(a.description.substring(0,100))}…</p>
                                <small>Макс. балл: ${a.maxScore}</small>
                            </div>
                            <div class="assignment-actions">
                                <button class="btn-small edit-btn" data-id="${a.id}">✏️ Ред.</button>
                                <button class="btn-small delete" data-id="${a.id}">🗑️ Удалить</button>
                            </div>
                        </div>
                    `).join('');
                }

                // Обработчики кнопок в списке
                document.querySelectorAll('.edit-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const id = btn.dataset.id;
                        editingId = id;
                        renderTeacherView(); // перерендерим форму с заполненными данными
                    });
                });

                document.querySelectorAll('.delete-btn').forEach(btn => {
                    // На самом деле класс .delete, но выше я использовал "delete", поэтому исправим селектор
                });
                // Более правильно:
                document.querySelectorAll('.delete').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const id = btn.dataset.id;
                        if (confirm('Вы уверены, что хотите удалить это задание? Все связанные работы учеников останутся, но задание будет помечено как неизвестное.')) {
                            let assignments = JSON.parse(localStorage.getItem('assignments')) || [];
                            assignments = assignments.filter(a => a.id != id);
                            localStorage.setItem('assignments', JSON.stringify(assignments));
                            if (editingId == id) editingId = null; // сброс редактирования, если удалили редактируемое
                            renderTeacherView();
                        }
                    });
                });

                // Кнопка сохранения (создание или обновление)
                document.getElementById('saveBtn').addEventListener('click', () => {
                    const title = document.getElementById('titleInput').value.trim();
                    const desc = document.getElementById('descInput').value.trim();
                    const max = parseInt(document.getElementById('maxScoreInput').value);
                    const ans = document.getElementById('answerInput').value.trim();
                    if (!title || !desc || !max || !ans) {
                        alert('Заполните все поля');
                        return;
                    }

                    let assignments = JSON.parse(localStorage.getItem('assignments')) || [];

                    if (editingId) {
                        // Обновление существующего
                        const index = assignments.findIndex(a => a.id == editingId);
                        if (index !== -1) {
                            assignments[index] = {
                                ...assignments[index],
                                title,
                                description: desc,
                                maxScore: max,
                                answer: ans
                            };
                            localStorage.setItem('assignments', JSON.stringify(assignments));
                            alert('Задание обновлено');
                        }
                        editingId = null;
                    } else {
                        // Создание нового
                        const newAss = {
                            id: Date.now(),
                            title,
                            description: desc,
                            maxScore: max,
                            answer: ans
                        };
                        assignments.push(newAss);
                        localStorage.setItem('assignments', JSON.stringify(assignments));
                        alert('Задание создано');
                    }
                    renderTeacherView();
                });

                // Кнопка отмены редактирования
                if (editingId) {
                    document.getElementById('cancelEditBtn').addEventListener('click', () => {
                        editingId = null;
                        renderTeacherView();
                    });
                }
            }

            // Простая защита от XSS в отображении
            function escapeHtml(unsafe) {
                return unsafe.replace(/[&<>"]/g, function(m) {
                    if (m === '&') return '&amp;';
                    if (m === '<') return '&lt;';
                    if (m === '>') return '&gt;';
                    if (m === '"') return '&quot;';
                    return m;
                });
            }

            // ---------- УЧЕНИЧЕСКАЯ ВЕРСИЯ (без изменений) ----------
            function renderStudentView() {
                const assignments = JSON.parse(localStorage.getItem('assignments')) || [];
                const submissions = JSON.parse(localStorage.getItem('submissions')) || [];

                // Фильтруем работы текущего ученика
                const mySubmissions = submissions.filter(s => s.student === username);
                const checkedSubs = mySubmissions.filter(s => s.checked);
                const pendingSubs = mySubmissions.filter(s => !s.checked);

                container.innerHTML = `
                    <h2>📚 Доступные задания</h2>
                    <div class="assignment-list" id="studentAssignList"></div>

                    <hr />

                    <h2>📋 Мои результаты</h2>
                    <div id="resultsContainer" class="results-list"></div>
                `;

                // Список доступных заданий
                const assignListDiv = document.getElementById('studentAssignList');
                if (assignments.length === 0) {
                    assignListDiv.innerHTML = '<p>Пока нет заданий. Обратитесь к учителю.</p>';
                } else {
                    assignListDiv.innerHTML = assignments.map(a => `
                        <div class="assignment-item">
                            <div class="assignment-info">
                                <h3>${escapeHtml(a.title)}</h3>
                                <p>${escapeHtml(a.description.substring(0,100))}…</p>
                                <small>Макс. балл: ${a.maxScore}</small>
                            </div>
                            <button class="btn-small" data-id="${a.id}">✍️ Выполнить</button>
                        </div>
                    `).join('');

                    document.querySelectorAll('[data-id]').forEach(btn => {
                        btn.addEventListener('click', (e) => {
                            const id = e.target.dataset.id;
                            window.open('assignment.html?id=' + id, '_blank');
                        });
                    });
                }

                // Отображение проверенных работ
                const resultsDiv = document.getElementById('resultsContainer');
                if (checkedSubs.length === 0) {
                    resultsDiv.innerHTML = '<p>У вас пока нет проверенных работ.</p>';
                } else {
                    resultsDiv.innerHTML = checkedSubs.map(sub => {
                        const ass = assignments.find(a => a.id == sub.assignmentId) || { title: 'Неизвестное задание', maxScore: '?' };
                        const answerHtml = sub.textAnswer ? sub.textAnswer.replace(/\n/g, '<br>') : '<em>Нет текстового ответа</em>';
                        const imagesHtml = sub.images && sub.images.length 
                            ? sub.images.map(src => `<img src="${src}" alt="Фото тетради">`).join('') 
                            : '';

                        return `
                            <div class="result-card">
                                <div class="result-header">
                                    <span class="result-title">${escapeHtml(ass.title)}</span>
                                    <span class="result-score">${sub.score} / ${ass.maxScore} баллов</span>
                                </div>
                                ${sub.teacherComment ? `<div class="result-comment">💬 Комментарий учителя: ${escapeHtml(sub.teacherComment)}</div>` : ''}
                                <div><strong>Ваш ответ:</strong></div>
                                <div class="student-answer-result">${answerHtml}</div>
                                ${imagesHtml ? `<div><strong>Прикреплённые фото:</strong> ${imagesHtml}</div>` : ''}
                                <small style="color:#4a6a8a;">Работа проверена</small>
                            </div>
                        `;
                    }).join('');
                }
            }

            render();
        })();
    </script>
</body>
</html>
</html>
