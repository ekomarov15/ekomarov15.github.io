<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Лингвист.ру — Проверка</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root{
  --bg:#fefeff;
  --card:#ffffff; --text:#0b1020; --muted:#5a6475;
  --primary:#2b6cff; --primary-600:#1f58d9; --ring:#bfd3ff;
  --success:#25c26e; --shadow:0 10px 25px rgba(17,24,39,.08);
}
*{box-sizing:border-box;}
body{
  margin:0; font-family:Inter, system-ui, Segoe UI, Roboto, Arial, sans-serif;
  color:var(--text);
  background:
    radial-gradient(1200px 600px at 70% -10%, #29417a20, transparent),
    radial-gradient(900px 500px at -10% 10%, #344b931f, transparent),
    var(--bg);
  height:100vh; overflow:hidden;
}
a{color:inherit; text-decoration:none;}

/* Меню слева */
.menu-btn{
  position:fixed; top:16px; left:16px; z-index:20;
  background:var(--primary); color:white;
  border:none; padding:10px 14px; border-radius:12px;
  cursor:pointer; font-size:16px;
}
.menu-btn:hover{background:var(--primary-600);}
.menu{
  position:fixed; top:0; left:0; height:100%; width:220px;
  background:var(--card); display:flex; flex-direction:column; padding-top:70px;
  gap:8px; border-right:1px solid #ffffff1f; transition:width 0.3s; box-shadow:var(--shadow);
}
.menu.collapsed{width:60px;}
.menu .logo{font-weight:700; font-size:20px; text-align:center; margin-bottom:24px; color:var(--text); transition:opacity 0.3s;}
.menu.collapsed .logo{opacity:0;}
.menu a{
  display:flex; align-items:center; gap:12px; padding:12px 20px;
  font-weight:600; border-radius:12px; color:var(--text); transition:background 0.2s, transform 0.2s;
}
.menu a i{min-width:20px; text-align:center;}
.menu.collapsed a span{display:none;}
.menu a:hover{background:#eaf0ff;}
.menu a.active{background:linear-gradient(135deg,var(--primary),var(--primary-600)); color:white;}

/* Контент */
.content{margin-left:220px; transition:margin-left 0.3s; display:flex; flex-direction:column; height:100vh; overflow:hidden;}
.content.expanded{margin-left:60px;}
.header{padding:16px; font-size:22px; font-weight:600; text-align:center;}

/* Основная зона */
.main{display:flex; gap:20px; padding:20px; overflow-y:auto; height:calc(100vh - 60px);}
.editor-section{flex:3; display:flex; flex-direction:column; gap:12px; max-height:100%;}
#editor{
  flex:1; padding:18px; border-radius:16px; background:var(--card);
  border:1px solid #ffffff1f; box-shadow:var(--shadow);
  font-size:16px; line-height:1.7; overflow-y:auto; color:var(--text);
  min-height:0; /* чтобы занимал всю высоту блока */
}

/* Панель кнопок с бледными оттенками */
.toolbar{display:flex; gap:10px; flex-wrap:wrap;}
.toolbar button{
  padding:10px 16px; border:none; border-radius:12px;
  cursor:pointer; transition:transform 0.1s; font-size:15px;
}
.toolbar button:hover{transform:scale(1.05);}
.btn-k1{background:#ffc1c1; color:#000; font-weight:300;}
.btn-k2{background:#b6e2b6; color:#000; font-weight:300;}
.btn-k3{background:#fff9a8; color:#000; font-weight:300;}
.btn-save{background:var(--primary); color:white; font-weight:700;}

/* Боковая панель критериев */
.sidebar{flex:1; display:flex; flex-direction:column; gap:14px; max-height:100%; overflow-y:auto;}
.criteria-card, .comment-card{
  background:var(--card); border-radius:16px; padding:18px;
  box-shadow:var(--shadow); display:flex; flex-direction:column; gap:8px;
}
.criteria-card label, .comment-card label{font-weight:700; font-size:15px;}
.criteria-card select, .criteria-card textarea, .comment-card textarea{
  width:100%; padding:10px; border-radius:12px; border:1px solid #ffffff1f;
  font-size:15px; background:#f7f9ff; color:var(--text);
  box-sizing:border-box;
}
textarea{
  resize:none; min-height:60px; max-height:120px; overflow-y:auto;
}
.score-box, .grade-box{
  padding:12px; border-radius:16px; background:#eaf0ff; font-weight:700; text-align:center; font-size:16px;
}
</style>
</head>
<body>

<button class="menu-btn" onclick="toggleMenu()">☰</button>

<div class="menu" id="sideMenu">
  <div class="logo">Лингвист.ру</div>
  <a href="#"><i class="fas fa-home"></i><span>Главная</span></a>
  <a href="#"><i class="fas fa-book"></i><span>Теория</span></a>
  <a href="#"><i class="fas fa-list-check"></i><span>Критерии</span></a>
  <a href="#" class="active"><i class="fas fa-pencil-alt"></i><span>Проверка</span></a>
</div>

<div class="content" id="mainContent">
  <div class="header">Экспертная проверка письменной работы</div>
  <div class="main">
    <div class="editor-section">
      <div class="toolbar">
        <button class="btn-k1" onclick="highlight('#ffc1c1')">К1 Орфография</button>
        <button class="btn-k2" onclick="highlight('#b6e2b6')">К2 Пунктуация</button>
        <button class="btn-k3" onclick="highlight('#fff9a8')">К3 Грамматика</button>
        <button class="btn-save" onclick="savePDF()">Сохранить PDF</button>
      </div>
      <div id="editor" contenteditable="true" placeholder="Введите текст работы здесь..."></div>
    </div>

    <div class="sidebar">
      <div class="criteria-card">
        <label>К1 — Орфография (0–3 балла)</label>
        <select id="k1" onchange="calculate()">
          <option value="0">0</option>
          <option value="1">1</option>
          <option value="2">2</option>
          <option value="3">3</option>
        </select>
        <textarea id="c1" placeholder="Комментарий по К1"></textarea>
      </div>
      <div class="criteria-card">
        <label>К2 — Пунктуация (0–3 балла)</label>
        <select id="k2" onchange="calculate()">
          <option value="0">0</option>
          <option value="1">1</option>
          <option value="2">2</option>
          <option value="3">3</option>
        </select>
        <textarea id="c2" placeholder="Комментарий по К2"></textarea>
      </div>
      <div class="criteria-card">
        <label>К3 — Грамматика (0–3 балла)</label>
        <select id="k3" onchange="calculate()">
          <option value="0">0</option>
          <option value="1">1</option>
          <option value="2">2</option>
          <option value="3">3</option>
        </select>
        <textarea id="c3" placeholder="Комментарий по К3"></textarea>
      </div>
      <div class="score-box">Сумма баллов: <span id="total">0</span> / 9</div>
      <div class="grade-box">Оценка: <span id="grade">—</span></div>
      <div class="comment-card">
        <label>Общий комментарий эксперта</label>
        <textarea id="finalComment" placeholder="Введите общий комментарий здесь..."></textarea>
      </div>
    </div>
  </div>
</div>

<script>
function toggleMenu(){
  document.getElementById("sideMenu").classList.toggle("collapsed");
  document.getElementById("mainContent").classList.toggle("expanded");
}

function highlight(color){
  document.execCommand("backColor", false, color);
}

function calculate(){
  const k1 = +document.getElementById("k1").value;
  const k2 = +document.getElementById("k2").value;
  const k3 = +document.getElementById("k3").value;
  const total = k1 + k2 + k3;
  document.getElementById("total").innerText = total;
  const percent = total / 9 * 100;
  let grade = 2; // по умолчанию
  if(percent >= 88) grade = 5;
  else if(percent >= 75) grade = 4;
  else if(percent >= 50) grade = 3;
  document.getElementById("grade").innerText = grade;
}

async function savePDF(){
  const { jsPDF } = window.jspdf;
  const editor=document.getElementById("editor");
  const canvas=await html2canvas(editor,{scale:2,backgroundColor:null});
  const imgData=canvas.toDataURL("image/png");
  const pdf=new jsPDF("p","mm","a4");
  const pageWidth=pdf.internal.pageSize.getWidth();
  const imgHeight=canvas.height*pageWidth/canvas.width;
  pdf.addImage(imgData,"PNG",0,0,pageWidth,imgHeight);
  pdf.save("lingvist_text_highlights.pdf");
}
</script>
</body>
</html>
