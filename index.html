<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Эксперт ЕГЭ — Редактор с оценкой</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
body {margin:0;font-family:'Segoe UI',sans-serif;background:#f0f2f5;color:#2c3e50;}
header {background: linear-gradient(90deg,#1a237e,#3949ab);color:white;padding:20px;text-align:center;font-size:24px;font-weight:600;}
.container {display:flex;gap:25px;padding:25px;}
.editor-section {flex:3;background:white;padding:25px;border-radius:15px;box-shadow:0 10px 25px rgba(0,0,0,0.08);}
#editor {min-height:420px;border:1px solid #dcdcdc;padding:15px;border-radius:10px;line-height:1.7;background:#fff;overflow-y:auto;}
.toolbar button {padding:8px 16px;margin-right:10px;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:500;transition:0.2s;}
.toolbar button:hover {opacity:0.85;}
.btn-k1 {background:#ffd6d6;}
.btn-k2 {background:#fff5c2;}
.btn-k3 {background:#d4fcd4;}
.btn-save {background:#3949ab;color:white;}
.sidebar {flex:1;background:white;padding:25px;border-radius:15px;box-shadow:0 10px 25px rgba(0,0,0,0.08);}
.criteria {background:#f8f9ff;padding:12px;border-radius:10px;margin-bottom:15px;}
label {font-weight:bold;margin-top:6px;display:block;}
select, textarea {width:100%;margin-top:6px;padding:6px;border-radius:6px;border:1px solid #ccc;font-size:14px;}
.score-box,.grade-box {background:#e8eaf6;padding:12px;border-radius:12px;text-align:center;font-weight:bold;margin-top:10px;}
textarea {height:60px;resize:vertical;}
@media print {.toolbar,.sidebar,header{display:none;}}
</style>
</head>
<body>

<header>Экспертная проверка письменной работы (ЕГЭ)</header>

<div class="container">

<div class="editor-section">
<div class="toolbar">
    <button class="btn-k1" onclick="highlight('#ffd6d6')">К1 Орфография</button>
    <button class="btn-k2" onclick="highlight('#fff5c2')">К2 Пунктуация</button>
    <button class="btn-k3" onclick="highlight('#d4fcd4')">К3 Грамматика</button>
    <button class="btn-save" onclick="savePDF()">Сохранить PDF</button>
</div>

<div id="editor" contenteditable="true" placeholder="Введите текст работы здесь..."></div>
</div>

<div class="sidebar">

<div class="criteria">
<label>К1 — Орфография (0–3 балла)</label>
<select id="k1" onchange="calculate()">
  <option value="0">0</option>
  <option value="1">1</option>
  <option value="2">2</option>
  <option value="3">3</option>
</select>
<textarea id="c1" placeholder="Комментарий по К1"></textarea>
</div>

<div class="criteria">
<label>К2 — Пунктуация (0–3 балла)</label>
<select id="k2" onchange="calculate()">
  <option value="0">0</option>
  <option value="1">1</option>
  <option value="2">2</option>
  <option value="3">3</option>
</select>
<textarea id="c2" placeholder="Комментарий по К2"></textarea>
</div>

<div class="criteria">
<label>К3 — Грамматика (0–3 балла)</label>
<select id="k3" onchange="calculate()">
  <option value="0">0</option>
  <option value="1">1</option>
  <option value="2">2</option>
  <option value="3">3</option>
</select>
<textarea id="c3" placeholder="Комментарий по К3"></textarea>
</div>

<div class="score-box">
Сумма баллов: <span id="total">0</span> / 9
</div>

<div class="grade-box">
Оценка: <span id="grade">—</span>
</div>

<h3>Общий комментарий эксперта</h3>
<textarea id="finalComment" placeholder="Введите общий комментарий здесь..."></textarea>

</div>

</div>

<script>
// Выделение текста цветом
function highlight(color){document.execCommand("backColor",false,color);}

// Подсчёт баллов и оценка
function calculate(){
    const k1 = +document.getElementById("k1").value;
    const k2 = +document.getElementById("k2").value;
    const k3 = +document.getElementById("k3").value;
    const total = k1 + k2 + k3;
    document.getElementById("total").innerText = total;

    const percent = total / 9 * 100;
    let grade = 2;
    if(percent >= 90) grade = 5;
    else if(percent >= 75) grade = 4;
    else if(percent >= 55) grade = 3;
    document.getElementById("grade").innerText = grade;
}

// Сохранение PDF только с текстом редактора и общим комментарием
async function savePDF(){
    const { jsPDF } = window.jspdf;
    const editor = document.getElementById("editor");
    const canvas = await html2canvas(editor,{scale:2,backgroundColor:null});
    const imgData = canvas.toDataURL("image/png");

    const pdf = new jsPDF("p","mm","a4");
    const pageWidth = pdf.internal.pageSize.getWidth();
    const pageHeight = pdf.internal.pageSize.getHeight();
    const imgHeight = canvas.height * pageWidth / canvas.width;
    pdf.addImage(imgData,"PNG",0,0,pageWidth,imgHeight);

    const comment = document.getElementById("finalComment").value;
    pdf.setFontSize(12);
    let yPos = imgHeight + 10;
    if(yPos > pageHeight - 50){pdf.addPage(); yPos = 10;}
    pdf.text("Общий комментарий эксперта:",10,yPos); yPos+=7;
    const commentLines = pdf.splitTextToSize(comment,pageWidth-20);
    commentLines.forEach(line=>{pdf.text(line,10,yPos);yPos+=7;});

    pdf.save("ege_checked_work.pdf");
}
</script>

</body>
</html>
